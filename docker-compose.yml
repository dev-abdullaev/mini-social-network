services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-social}
      POSTGRES_USER: ${POSTGRES_USER:-social}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-social}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-social}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    ports:
      - "8000:8000"
    volumes:
      - mediadata:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A config worker --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    volumes:
      - mediadata:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    command: celery -A config beat --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    volumes:
      - mediadata:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  mediadata:
