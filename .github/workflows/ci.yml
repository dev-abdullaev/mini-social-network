name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: social
          POSTGRES_USER: social
          POSTGRES_PASSWORD: social
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U social"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/local.txt

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: pytest -v
